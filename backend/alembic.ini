# =============================================================================
# Alembic Configuration — Enterprise RAG AI Assistant
# =============================================================================
# This file configures the Alembic database migration tool.
#
# The DATABASE_URL is read dynamically from the application settings in
# alembic/env.py — do NOT set sqlalchemy.url here for production use.
#
# Usage:
#   alembic revision --autogenerate -m "your migration message"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history
# =============================================================================

[alembic]
# Path to migration scripts directory.
script_location = alembic

# Template for new migration file names.
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d_%(rev)s_%(slug)s.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path entry so Python can find the 'app' package.
prepend_sys_path = .

# How to locate the version table in multi-database setups.
version_path_separator = os

# =============================================================================
# Logging
# =============================================================================
# Alembic uses stdlib logging — these settings only affect the alembic CLI.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
