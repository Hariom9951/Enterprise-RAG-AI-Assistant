# Nginx Reverse Proxy Configuration
# ===================================
# Phase 1 stub — Nginx will be used in production as a reverse proxy
# in front of both the backend (FastAPI) and frontend (Next.js) services.
#
# Activate in Phase 5 when preparing the production deployment.
#
# Planned configuration:
#   - Route /api/v1/* → backend:8000
#   - Route /*        → frontend:3000
#   - SSL termination (via Let's Encrypt / cert-manager)
#   - Gzip compression
#   - Static file caching

events {
    worker_connections 1024;
}

http {
    # ── Upstream Definitions ─────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ── Server Block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── API Proxy ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── API Docs Proxy ────────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Frontend Proxy ────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
