# =============================================================================
# Enterprise RAG AI Assistant — Production Docker Compose
# =============================================================================
# Orchestrates the full application stack in production:
#   - postgres:      PostgreSQL 16 with pgvector extension
#   - redis:         Redis 7 Message Broker & Cache database
#   - backend:       FastAPI + Uvicorn API server (Python 3.12, multi-stage)
#   - celery_worker: Background task runner for processing & embeddings
#   - celery_beat:   Task scheduler for daily cleanups
#   - frontend:      Next.js 15 standalone build
#
# Usage:
#   docker compose up --build -d
# =============================================================================

version: "3.9"

# =============================================================================
# Networks
# =============================================================================
networks:
  rag_network:
    driver: bridge
    name: rag_network

# =============================================================================
# Shared Persistent Volumes
# =============================================================================
volumes:
  postgres_data:
    name: rag_postgres_data
  backend_logs:
    name: rag_backend_logs
  rag_storage:
    name: rag_storage

# =============================================================================
# Services
# =============================================================================
services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragpassword}
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── Cache & Message Broker ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server (FastAPI) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: rag_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_NAME: "Enterprise RAG AI Assistant"
      APP_VERSION: "0.2.0"
      ENVIRONMENT: production
      DEBUG: "false"
      
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKERS: "4"

      API_V1_PREFIX: /api/v1
      DOCS_URL: "/docs"
      REDOC_URL: "/redoc"

      ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000,https://rag.mycompany.com"
      ALLOW_CREDENTIALS: "true"

      LOG_LEVEL: INFO
      LOG_FORMAT: json
      LOG_FILE_PATH: /app/logs/app.log

      DATABASE_URL: "postgresql+asyncpg://raguser:${DB_PASSWORD:-ragpassword}@postgres:5432/ragdb"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: ${SECRET_KEY:-PLACEHOLDER_GENERATE_WITH_SECRET_IN_PRODUCTION}
      ALGORITHM: HS256
      STORAGE_DIR: "/app/storage"
    ports:
      - "8000:8000"
    volumes:
      - backend_logs:/app/logs
      - rag_storage:/app/storage
    networks:
      - rag_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: rag_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      APP_NAME: "Enterprise RAG AI Assistant - Worker"
      ENVIRONMENT: production
      DEBUG: "false"
      REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql+asyncpg://raguser:${DB_PASSWORD:-ragpassword}@postgres:5432/ragdb"
      SECRET_KEY: ${SECRET_KEY:-PLACEHOLDER_GENERATE_WITH_SECRET_IN_PRODUCTION}
      ALGORITHM: HS256
      STORAGE_DIR: "/app/storage"
    volumes:
      - rag_storage:/app/storage
    networks:
      - rag_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Beat (Scheduler) ──────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: rag_celery_beat
    restart: unless-stopped
    healthcheck:
      disable: true
    command: celery -A app.tasks.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file:
      - ./backend/.env
    environment:
      APP_NAME: "Enterprise RAG AI Assistant - Beat"
      ENVIRONMENT: production
      DEBUG: "false"
      REDIS_URL: "redis://redis:6379/0"
      DATABASE_URL: "postgresql+asyncpg://raguser:${DB_PASSWORD:-ragpassword}@postgres:5432/ragdb"
      SECRET_KEY: ${SECRET_KEY:-PLACEHOLDER_GENERATE_WITH_SECRET_IN_PRODUCTION}
      ALGORITHM: HS256
      STORAGE_DIR: "/app/storage"
    volumes:
      - rag_storage:/app/storage
    networks:
      - rag_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
      API_INTERNAL_URL: "http://backend:8000/api/v1"
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    networks:
      - rag_network
    depends_on:
      backend:
        condition: service_healthy
