# =============================================================================
# pytest configuration — Enterprise RAG AI Assistant
# =============================================================================
[pytest]
# Run all tests in asyncio mode automatically (pytest-asyncio v0.24+)
asyncio_mode = auto

# Default fixture loop scope — use function scope for proper test isolation.
asyncio_default_fixture_loop_scope = function

# Show compact tracebacks, quiet output
addopts = --tb=short -q

# Test discovery paths
testpaths = tests
