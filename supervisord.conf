; =============================================================================
; Enterprise RAG AI Assistant — Supervisord Configuration
; =============================================================================
; Manages two long-running processes inside the single HF Spaces container:
;
;   [program:uvicorn]      FastAPI ASGI server   → port %(ENV_PORT)s
;   [program:celery]       Celery document worker (background processing)
;
; All output is routed to stdout/stderr so HF Spaces captures it in its log
; viewer without requiring persistent log files.
; =============================================================================

[supervisord]
nodaemon=true
user=appuser
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

; ── FastAPI / Uvicorn ────────────────────────────────────────────────────────
[program:uvicorn]
command=uvicorn app.main:app
    --host 0.0.0.0
    --port %(ENV_PORT)s
    --workers 1
    --log-level info
    --no-access-log
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app"

; ── Celery Worker ────────────────────────────────────────────────────────────
[program:celery]
command=celery -A app.tasks.celery_app worker
    --loglevel=info
    --concurrency=1
    --max-tasks-per-child=50
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=3
stopwaitsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONPATH="/app"
